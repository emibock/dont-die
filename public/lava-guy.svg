<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" fill="none">
  <!-- Body -->
  <ellipse cx="50" cy="110" rx="25" ry="35" fill="#4A90E2" stroke="#2563EB" stroke-width="2"/>

  <!-- Head -->
  <circle cx="50" cy="45" r="30" fill="#4A90E2" stroke="#2563EB" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="40" cy="40" r="4" fill="#1a1a1a"/>
  <circle cx="60" cy="40" r="4" fill="#1a1a1a"/>

  <!-- Mouth (happy) -->
  <path d="M 35 52 Q 50 60 65 52" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Arms -->
  <line x1="25" y1="95" x2="10" y2="105" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="95" x2="90" y2="105" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="40" y1="145" x2="35" y2="155" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="145" x2="65" y2="155" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
</svg>
